name: CI - Data Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Notebooks and Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbformat jsonschema
    
    - name: Validate notebook structure
      run: |
        echo "Validating Jupyter notebooks..."
        python -c "
import os
import json
import nbformat
from pathlib import Path

notebook_dir = Path('Notebooks')
if not notebook_dir.exists():
    print('No Notebooks directory found, skipping validation')
    exit(0)

errors = []
for notebook_path in notebook_dir.glob('*.ipynb'):
    try:
        with open(notebook_path, 'r', encoding='utf-8') as f:
            nb = nbformat.read(f, as_version=4)
        print(f'✓ {notebook_path.name} is valid')
    except Exception as e:
        errors.append(f'✗ {notebook_path.name}: {str(e)}')
        print(f'✗ {notebook_path.name}: {str(e)}')

if errors:
    print(f'\nFound {len(errors)} invalid notebook(s)')
    exit(1)
else:
    print(f'\nAll notebooks are valid!')
        "
    
    - name: Check Python syntax in notebooks
      run: |
        echo "Checking Python syntax..."
        python -c "
import os
import json
import ast
import nbformat
from pathlib import Path

notebook_dir = Path('Notebooks')
if not notebook_dir.exists():
    print('No Notebooks directory found, skipping syntax check')
    exit(0)

errors = []
for notebook_path in notebook_dir.glob('*.ipynb'):
    try:
        with open(notebook_path, 'r', encoding='utf-8') as f:
            nb = nbformat.read(f, as_version=4)
        
        for idx, cell in enumerate(nb.cells):
            if cell.cell_type == 'code':
                try:
                    # Try to parse the Python code
                    ast.parse(cell.source)
                except SyntaxError as e:
                    errors.append(f'{notebook_path.name} cell {idx+1}: {str(e)}')
        
        if not any(notebook_path.name in err for err in errors):
            print(f'✓ {notebook_path.name} syntax valid')
    except Exception as e:
        errors.append(f'{notebook_path.name}: {str(e)}')

if errors:
    print(f'\nFound {len(errors)} syntax error(s):')
    for error in errors:
        print(f'  ✗ {error}')
    exit(1)
else:
    print(f'\nAll notebooks have valid Python syntax!')
        "
    
    - name: Check README exists
      run: |
        if [ ! -f README.md ]; then
          echo "✗ README.md not found"
          exit 1
        fi
        echo "✓ README.md exists"
    
    - name: Summary
      if: success()
      run: |
        echo "✅ All checks passed!"
        echo "- Notebook structure validated"
        echo "- Python syntax checked"
        echo "- Documentation verified"
